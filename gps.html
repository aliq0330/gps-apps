<!-- SADECE PUSULA KISMI DEĞİŞTİRİLDİ -->

<style>
/* iPhone tarzı pusula /
.compass{
width:260px;
height:260px;
border-radius:50%;
background:#000;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/ dönen disk /
.compass-dial{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
transition:transform 0.15s linear;
}

/ derece çizgileri /
.compass-dial::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:
repeating-conic-gradient(
white 0deg 2deg,
transparent 2deg 6deg
);
opacity:0.6;
mask:radial-gradient(circle, transparent 60%, black 61%);
}

/ ana yön harfleri /
.compass-dir{
position:absolute;
color:white;
font-size:18px;
font-weight:600;
font-family:'Space Mono',monospace;
}

.dir-n{top:10px;left:50%;transform:translateX(-50%);color:red}
.dir-s{bottom:10px;left:50%;transform:translateX(-50%)}
.dir-e{right:10px;top:50%;transform:translateY(-50%)}
.dir-w{left:10px;top:50%;transform:translateY(-50%)}

/ ortadaki crosshair /
.compass-cross{
position:absolute;
width:100%;
height:100%;
}

.compass-cross::before,
.compass-cross::after{
content:"";
position:absolute;
background:rgba(255,255,255,0.4);
}

.compass-cross::before{
width:1px;height:100%;
left:50%;
transform:translateX(-50%);
}

.compass-cross::after{
height:1px;width:100%;
top:50%;
transform:translateY(-50%);
}

/ sabit üst pointer /
.compass-pointer{
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
width:0;height:0;
border-left:8px solid transparent;
border-right:8px solid transparent;
border-bottom:18px solid red;
z-index:5;
}

/ merkez nokta */
.compass-center{
width:12px;height:12px;
border-radius:50%;
background:#fff;
z-index:3;
}
</style>

<!-- HTML değişimi -->
<div class="compass-wrap">
  <div class="compass">
    
    <div class="compass-pointer"></div>

    <div class="compass-dial" id="compassDial">
      <div class="compass-dir dir-n">K</div>
      <div class="compass-dir dir-s">G</div>
      <div class="compass-dir dir-e">D</div>
      <div class="compass-dir dir-w">B</div>
    </div>

    <div class="compass-cross"></div>
    <div class="compass-center"></div>
  </div>

  <div class="compass-degree-badge" id="compassDegree">---°</div>
  <div class="compass-dir-badge" id="compassDirBadge">Pusula bekleniyor</div>
</div>

<script>
function updateCompassUI(heading) {
  if (heading == null) return;

  var deg = Math.round(heading);
  var dir = headingToDir(heading);

  // iPhone mantığı: ibre sabit, disk döner
  document.getElementById('compassDial').style.transform =
    'rotate(' + (-heading) + 'deg)';

  document.getElementById('compassDegree').textContent = deg + '°';
  document.getElementById('compassDirBadge').textContent = dir;

  document.getElementById('directionDisplay').innerHTML =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" style="transform:rotate(' + heading + 'deg)"><polygon points="12 2 4 20 12 16 20 20"/></svg> ' +
    deg + '° ' + dir;
}
</script>
